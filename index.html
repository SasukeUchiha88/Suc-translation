<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Screen Translator Bubble</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Floating Bubble -->
  <div class="bubble" id="bubble">
    🌐
  </div>

  <!-- Main Container -->
  <div class="container">

    <!-- Header -->
    <div class="header">

      <div>
        <h1 class="logo">AI Translator</h1>
        <p style="color:#94a3b8; margin-top:4px;">
          Premium Bubble Translation
        </p>
      </div>

      <div class="status">
        ● LIVE
      </div>

    </div>

    <!-- Translator Card -->
    <div class="card">

      <!-- Language Selector -->
      <div class="selects">

        <select id="fromLang">

          <option value="auto">🌍 Auto</option>
          <option value="en">🇺🇸 English</option>
          <option value="bn">🇧🇩 Bangla</option>
          <option value="ja">🇯🇵 Japanese</option>
          <option value="ko">🇰🇷 Korean</option>
          <option value="hi">🇮🇳 Hindi</option>

        </select>

        <select id="toLang">

          <option value="bn">🇧🇩 Bangla</option>
          <option value="en">🇺🇸 English</option>
          <option value="ja">🇯🇵 Japanese</option>
          <option value="ko">🇰🇷 Korean</option>
          <option value="hi">🇮🇳 Hindi</option>

        </select>

      </div>

      <!-- Input -->
      <textarea
        id="inputText"
        placeholder="Type or paste text here..."
      ></textarea>

      <!-- Button -->
      <button
        class="translate-btn"
        id="translateBtn"
      >
        ⚡ Translate Now
      </button>

      <!-- Result -->
      <div class="result">

        <h3>Translated Result</h3>

        <div
          class="result-text"
          id="resultText"
        >
          🌍 Ready for translation...
        </div>

      </div>

    </div>

    <!-- Features Card -->
    <div class="card">

      <h2 style="margin-bottom:15px;">
        ✨ Premium Features
      </h2>

      <ul style="line-height:2; color:#cbd5e1; padding-left:20px;">

        <li>AI Translation</li>
        <li>Floating Bubble</li>
        <li>Voice Speak</li>
        <li>Typing Animation</li>
        <li>Mobile Responsive</li>
        <li>Drag Bubble Anywhere</li>
        <li>Live Translation Effect</li>

      </ul>

    </div>

  </div>

  <!-- JavaScript -->
  <script src="main.js"></script>

</body>
</html>
